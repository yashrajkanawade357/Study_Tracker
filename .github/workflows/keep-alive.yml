name: keep-alive

# Keeps the Supabase free project from auto-pausing (it sleeps after ~7
# days of no API activity, which would break auth/data/the demo). This
# pings the project daily so the inactivity timer never elapses.
#
# Setup (one time): add a repo secret named SUPABASE_ANON_KEY
#   GitHub repo → Settings → Secrets and variables → Actions → New secret
#   Value = your VITE_SUPABASE_ANON_KEY (the public anon key from .env).

on:
  schedule:
    - cron: '17 6 * * *'      # every day at 06:17 UTC
  workflow_dispatch:           # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (keeps the project awake)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://qdznikbezauhjindumul.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded: $code"
          if [ "$code" != "200" ]; then echo "::warning::Unexpected status $code"; fi

      - name: Ping live site (Google Cloud)
        run: curl -s -o /dev/null -w "Site responded: %{http_code}\n" https://vyora-3d282.web.app

      - name: Ping mirror (Vercel)
        run: curl -s -o /dev/null -w "Mirror responded: %{http_code}\n" https://study-tracker-eight-delta.vercel.app
